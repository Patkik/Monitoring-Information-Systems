# Nginx configuration for Mentoring System backend
# This file should be placed at /etc/nginx/sites-available/mentoring-system
# Then symlink to /etc/nginx/sites-enabled/ and run: sudo systemctl restart nginx

upstream nodejs_backend {
    server localhost:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name 3.27.82.249;  # Replace with your domain or keep IP
    
    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
    
    client_max_body_size 50M;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;
    
    # API proxy configuration
    location /api {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        
        # Headers for proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://nodejs_backend;
        proxy_set_header Host $host;
        access_log off;  # Suppress health check logs for cleaner output
    }
    
    # Serve uploaded files (if storing locally)
    location /uploads {
        proxy_pass http://nodejs_backend;
        proxy_set_header Host $host;
        expires 7d;  # Cache uploaded files for 7 days
    }
    
    # Catch-all - redirect to API
    location / {
        return 301 /api;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

