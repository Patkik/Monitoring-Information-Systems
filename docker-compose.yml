services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # MongoDB Atlas (set in .env at repo root)
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_URI_FALLBACK: ${MONGODB_URI_FALLBACK:-}
      MONGODB_DNS_SERVERS: ${MONGODB_DNS_SERVERS:-8.8.8.8,1.1.1.1}
      MONGODB_CONNECT_RETRIES: ${MONGODB_CONNECT_RETRIES:-10}
      MONGODB_CONNECT_BACKOFF_MS: ${MONGODB_CONNECT_BACKOFF_MS:-2000}
      # Security
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_DISABLED: ${RECAPTCHA_DISABLED:-false}
      # CORS: allow nginx frontend (docker internal) + ngrok tunnel URLs
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost,http://127.0.0.1}
      SERVER_URL: ${SERVER_URL:-http://localhost}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      # Pusher
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-ap1}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@mentoring-system.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Mentoring System}
      # Features
      FEATURE_FEEDBACK_ENABLED: ${FEATURE_FEEDBACK_ENABLED:-true}
      FEATURE_CERTIFICATES_ENABLED: ${FEATURE_CERTIFICATES_ENABLED:-true}
      FEATURE_CHAT_ENABLED: ${FEATURE_CHAT_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Google Calendar Integration
      CALENDAR_TOKEN_SECRET: ${CALENDAR_TOKEN_SECRET}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    expose:
      - "4000"
    volumes:
      - backend_uploads:/usr/src/app/uploads
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In Docker: all API calls go through nginx proxy at /api — use relative path
        VITE_API_URL: /api
        VITE_PUSHER_KEY: ${VITE_PUSHER_KEY:-}
        VITE_PUSHER_CLUSTER: ${VITE_PUSHER_CLUSTER:-ap1}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Mentoring System}
        VITE_RECAPTCHA_DISABLED: ${VITE_RECAPTCHA_DISABLED:-false}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ngrok tunnel ─────────────────────────────────────────────────────────────
  # Exposes the frontend (nginx) publicly via a secure tunnel.
  # Get a free authtoken at https://dashboard.ngrok.com/get-started/your-authtoken
  # then set NGROK_AUTHTOKEN in your .env file.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "frontend:80"
      - "--log=stdout"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "${NGROK_DASHBOARD_PORT:-4040}:4040"
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  app:
    driver: bridge

volumes:
  backend_uploads:
